<div class="visitor-panel">
  <div class="visitor-total-icon" aria-hidden="true">◎</div>
  <div class="visitor-details">
    {% if page.lang == "zh-CN" %}
      <span class="visitor-kicker">累计访问量</span>
      <h2>感谢你的访问</h2>
      <p>以下数字统计中文与英文主页的累计访问总量。</p>
      <img class="visitor-counter" src="https://api.visitorbadge.io/api/visitors?path=xiaohaoyi097-alt.github.io&amp;label=%E7%B4%AF%E8%AE%A1%E8%AE%BF%E9%97%AE%E9%87%8F&amp;countColor=%23245a9b" alt="主页累计访问量">
    {% else %}
      <span class="visitor-kicker">Total Visitors</span>
      <h2>Thank you for visiting</h2>
      <p>This counter shows the combined total visits to the Chinese and English homepages.</p>
      <img class="visitor-counter" src="https://api.visitorbadge.io/api/visitors?path=xiaohaoyi097-alt.github.io&amp;label=Total%20Visitors&amp;countColor=%23245a9b" alt="Total homepage visitors">
    {% endif %}
  </div>
</div>
